name: skin_cancer_app
description: AI Skin Cancer Detection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # للـ API
  http: ^1.2.1
  
  # لاختيار الصور
  image_picker: ^1.1.2
  
  # أيقونات
  cupertino_icons: ^1.0.8

  google_fonts: ^6.2.1
  
  simple_web_camera: ^1.0.11

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # 👇 إضافات جديدة للشعار وشاشة الترحيب
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  
  # 👇 assets جديدة للصور
  assets:
    - assets/icon/icon.png
    - assets/icon/splash.png

# 👇 إعدادات أيقونة التطبيق
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21

# 👇 إعدادات شاشة الترحيب
flutter_native_splash:
  color: "#2196F3"
  image: assets/icon/splash.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true